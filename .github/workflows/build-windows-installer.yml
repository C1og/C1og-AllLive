name: build-windows-installer

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-uwp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install UWP build tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $installPath) { throw "Visual Studio not found." }
          "VSINSTALLPATH=$installPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          & $vsInstaller modify --installPath "$installPath" --add Microsoft.VisualStudio.Workload.Universal --add Microsoft.VisualStudio.Component.Windows10SDK.19041 --add Microsoft.VisualStudio.ComponentGroup.UWP.VC --includeRecommended --includeOptional --passive --norestart --wait
      - name: Ensure Windows SDK references
        shell: pwsh
        run: |
          $sdkRoot = Join-Path "${env:ProgramFiles(x86)}" "Windows Kits\10"
          $sdkRefs = Join-Path $sdkRoot "References"
          if (-not (Test-Path $sdkRefs)) {
            $installer = Join-Path $env:RUNNER_TEMP "winsdksetup.exe"
            $sdkUrl = "https://go.microsoft.com/fwlink/?linkid=2120843"
            Invoke-WebRequest -Uri $sdkUrl -OutFile $installer
            Start-Process -FilePath $installer -ArgumentList "/Quiet /NoRestart" -Wait
          }
          if (-not (Test-Path $sdkRefs)) { throw "Windows SDK reference assemblies still missing under $sdkRefs" }
      - uses: microsoft/setup-msbuild@v2
      - name: Resolve Windows SDK version
        shell: pwsh
        run: |
          $sdkRoot = Join-Path "${env:ProgramFiles(x86)}" "Windows Kits\10"
          $sdkRefs = Join-Path $sdkRoot "References"
          $sdkVersion = $null
          if (Test-Path $sdkRefs) {
            $sdkVersion = Get-ChildItem -Path $sdkRefs -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } | Where-Object {
              Test-Path (Join-Path $_.FullName "Windows.Foundation.UniversalApiContract\10.0.0.0\Windows.Foundation.UniversalApiContract.winmd")
            } | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          }
          if (-not $sdkVersion) { throw "Windows SDK reference assemblies not found under $sdkRefs" }
          "WINDOWS_SDK_VERSION=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_SDK_DIR=$sdkRoot\" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Diagnose UWP SDK and XAML targets
        shell: pwsh
        run: |
          "VSInstallPath=$env:VSINSTALLPATH"
          $xamlTargets = Get-ChildItem -Path $env:VSINSTALLPATH -Recurse -Filter Microsoft.Windows.UI.Xaml.CSharp.targets -ErrorAction SilentlyContinue | Select-Object -First 5
          "WindowsXamlTargets:"
          $xamlTargets.FullName
          "WindowsSdkDir=$env:WindowsSdkDir"
          "WindowsSDKVersion=$env:WindowsSDKVersion"
          "ResolvedWindowsSdkDir=$env:WINDOWS_SDK_DIR"
          "ResolvedWindowsSDKVersion=$env:WINDOWS_SDK_VERSION"
          $sdkRoot = Join-Path "${env:ProgramFiles(x86)}" "Windows Kits\10"
          if (Test-Path $sdkRoot) {
            "WindowsSDKRoot=$sdkRoot"
            Get-ChildItem -Path (Join-Path $sdkRoot "Lib") -ErrorAction SilentlyContinue | Select-Object -First 10 | ForEach-Object { $_.FullName }
            $winmd = Get-ChildItem -Path $sdkRoot -Recurse -Filter Windows.winmd -ErrorAction SilentlyContinue | Select-Object -First 5
            "WindowsWinmd:"
            $winmd.FullName
          } else {
            "WindowsSDKRoot not found."
          }
      - name: Build UWP app package
        shell: cmd
        run: |
          call "%VSINSTALLPATH%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 -winsdk=%WINDOWS_SDK_VERSION%
          set WindowsSdkDir=%WINDOWS_SDK_DIR%
          set WindowsSDKVersion=%WINDOWS_SDK_VERSION%\
          set MSBuildExtensionsPath=%VSINSTALLPATH%\MSBuild
          set MSBuildExtensionsPath32=%VSINSTALLPATH%\MSBuild
          set MSBuildExtensionsPath64=%VSINSTALLPATH%\MSBuild
          "%VSINSTALLPATH%\MSBuild\Current\Bin\MSBuild.exe" AllLive.UWP\AllLive.UWP.csproj /restore /p:Configuration=Release /p:Platform=x64 /p:VisualStudioVersion=17.0 /p:WindowsSdkDir="%WINDOWS_SDK_DIR%" /p:WindowsSDKVersion=%WINDOWS_SDK_VERSION%\ /p:TargetPlatformVersion=%WINDOWS_SDK_VERSION% /p:TargetPlatformMinVersion=10.0.18362.0 /p:GenerateAppxPackageOnBuild=true /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Never /p:AppxPackageSigningEnabled=false /p:AppxPackageDir=AppPackages\
      - name: Upload app package
        uses: actions/upload-artifact@v4
        with:
          name: all-live-uwp-appx
          path: AllLive.UWP/AppPackages/**
