name: build-windows-installer

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-uwp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install UWP build tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $installPath) { throw "Visual Studio not found." }
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          & $vsInstaller modify --installPath "$installPath" --add Microsoft.VisualStudio.Workload.Universal --add Microsoft.VisualStudio.Component.Windows10SDK.19041 --add Microsoft.VisualStudio.ComponentGroup.UWP.VC --includeRecommended --passive --norestart --wait
      - uses: microsoft/setup-msbuild@v2
      - name: Diagnose UWP SDK and XAML targets
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          "VSInstallPath=$installPath"
          $xamlTargets = Get-ChildItem -Path $installPath -Recurse -Filter Microsoft.Windows.UI.Xaml.CSharp.targets -ErrorAction SilentlyContinue | Select-Object -First 5
          "WindowsXamlTargets:"
          $xamlTargets.FullName
          "WindowsSdkDir=$env:WindowsSdkDir"
          "WindowsSDKVersion=$env:WindowsSDKVersion"
          $sdkRoot = Join-Path "${env:ProgramFiles(x86)}" "Windows Kits\10"
          if (Test-Path $sdkRoot) {
            "WindowsSDKRoot=$sdkRoot"
            Get-ChildItem -Path (Join-Path $sdkRoot "Lib") -ErrorAction SilentlyContinue | Select-Object -First 10 | ForEach-Object { $_.FullName }
            $winmd = Get-ChildItem -Path $sdkRoot -Recurse -Filter Windows.winmd -ErrorAction SilentlyContinue | Select-Object -First 5
            "WindowsWinmd:"
            $winmd.FullName
          } else {
            "WindowsSDKRoot not found."
          }
      - name: Build UWP app package
        shell: pwsh
        run: msbuild AllLive.UWP\AllLive.UWP.csproj /restore /p:Configuration=Release /p:Platform=x64 /p:VisualStudioVersion=17.0 /p:GenerateAppxPackageOnBuild=true /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Never /p:AppxPackageSigningEnabled=false /p:AppxPackageDir=AppPackages\
      - name: Upload app package
        uses: actions/upload-artifact@v4
        with:
          name: all-live-uwp-appx
          path: AllLive.UWP/AppPackages/**
